# Backtest Environment Configuration
# Modify this file to run different experiments

[data]
# H5 data path for price/volume data
h5_path = "/workspace/qlib_research/qlib_data/h5_data/daily_pv_all.h5"

[backtest]
# Initial capital
initial_capital = 100_000_000
# Number of stocks to hold
topk = 50
# Number of stocks to replace each day
n_drop = 5
# Trading costs
open_cost = 0.0007
close_cost = 0.0008
# Minimum cost threshold
min_cost = 0.0
# Risk degree (investment ratio)
risk_degree = 0.95
# Minimum hold days before a stock can be sold (0 = no restriction)
min_hold_days = 5
# Stop loss threshold (0.10 = sell if price drops 10% from entry, 0 = disabled)
stop_loss = 0.10

[inference]
# Features to use
features = ["OPEN", "HIGH", "LOW", "RET", "VOL"]
# Normalization stats end date
train_end_date = "2022-12-31"

[period]
# Test period (overridden by --from/--to CLI args)
start = "2025-01-01"
end = "2025-12-31"

[benchmark]
# Benchmark instrument (e.g., "SPY" or "SH000300")
instrument = "SPY"
# Qlib reference path (optional - for comparison with Qlib's own backtest)
qlib_reference_path = "/workspace/RD-Agent/rdagent/scenarios/qlib/experiment/model_template/mlruns/154961695803986850/0db5e2258c6845e5935bbdbae98c5a91/artifacts/portfolio_analysis/report_normal_1day.pkl"
qlib_pred_path = "/workspace/RD-Agent/rdagent/scenarios/qlib/experiment/model_template/mlruns/154961695803986850/0db5e2258c6845e5935bbdbae98c5a91/artifacts/pred.pkl"
