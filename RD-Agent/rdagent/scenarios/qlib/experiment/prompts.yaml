qlib_factor_background: |-
  A factor is a numerical characteristic of an instrument on a given day, used to predict future returns.
  Each factor must be statically defined with fixed hyperparameters (e.g., last-10-day momentum and last-20-day momentum are separate factors).
  Factor definition includes: Name, Description, Formulation, Variables.
  Specify all hyperparameters explicitly (window size, lookback period, etc.).
 
  {% if runtime_environment is not none %}
  ====== Runtime Environment ======
  You have following environment to run the code:
  {{ runtime_environment }}
  {% endif %}

qlib_factor_interface: |-
  Your python code should follow the interface to better interact with the user's system.
  Your python code should contain the following part: the import part, the function part, and the main part. You should write a main function name: "calculate_{function_name}" and call this function in "if __name__ == __main__" part. Don't write any try-except block in your python code. The user will catch the exception message and provide the feedback to you.
  User will write your python code into a python file and execute the file directly with "python {your_file_name}.py". You should calculate the factor values and save the result into a HDF5(H5) file named "result.h5" in the same directory as your python file. The result file is a HDF5(H5) file containing a pandas dataframe. The index of the dataframe is the "datetime" and "instrument", and the single column name is the factor name,and the value is the factor value. The result file should be saved in the same directory as your python file.

qlib_factor_strategy: |-
  ⚠️ **MultiIndex Rules** — DataFrame index: ['datetime', 'instrument']. Output order is ALWAYS (datetime, instrument).

  **Rule 1 — groupby on index levels:**
  ```python
  # ✅ CORRECT
  df.groupby(level=1)['$close']
  # ❌ WRONG — KeyError: 'instrument' is not a column
  df.groupby('instrument')['$close']
  ```

  **Rule 2 — transform() for index alignment:**
  ```python
  # ✅ CORRECT
  df['f'] = df.groupby(level=1)['$close'].transform(lambda x: x.pct_change())
  # ❌ WRONG — may misalign index
  df['f'] = df.groupby(level=1)['$close'].pct_change()
  ```

  **Rule 3 — never reorder index:**
  ```python
  # ✅ CORRECT — keeps (datetime, instrument)
  df.sort_index()
  # ❌ WRONG — flips order
  df.sort_index(level=[1, 0])
  result.swaplevel()
  ```

  **Rule 4 — built-in vectorized methods ONLY:**

  Allowed inside transform(lambda x: ...):
  - Arithmetic: +, -, *, /, //, **
  - Aggregations: mean(), std(), var(), min(), max(), median(), quantile(), sum(), count()
  - Rolling: rolling(N).mean/std/var/min/max/quantile(q)
  - Shifting: shift(N), diff(N), pct_change(N)

  Forbidden (hidden loops, extremely slow):
  - .apply(custom_func), .rolling().apply(...), iterrows(), explicit for loops
  - If your factor cannot use built-in methods only, simplify the factor.

  **Code Template:**
  ```python
  import pandas as pd
  import numpy as np

  def calculate_factor_name():
      df = pd.read_hdf("daily_pv.h5", key="data")
      df = df.sort_index()

      df['factor_name'] = df.groupby(level=1)['$close'].transform(
          lambda x: x.pct_change(periods=10)
      )
      df['factor_name'] = df['factor_name'].replace([np.inf, -np.inf], np.nan)

      result = df[['factor_name']].copy()
      result.to_hdf("result.h5", key="data")

  if __name__ == "__main__":
      calculate_factor_name()
  ```

  **Common Patterns:**
  ```python
  # Momentum
  df['mom'] = df.groupby(level=1)['$close'].transform(
      lambda x: (x - x.shift(N)) / x.shift(N)
  )
  # Volatility
  df['ret'] = df.groupby(level=1)['$close'].transform(lambda x: x.pct_change())
  df['vol'] = df.groupby(level=1)['ret'].transform(
      lambda x: x.rolling(N, min_periods=N).std()
  )
  # Rolling mean
  df['avg'] = df.groupby(level=1)['$volume'].transform(
      lambda x: x.rolling(N, min_periods=1).mean()
  )
  ```

  **Merging with External Data (only when needed):**
  ```python
  df = df.reset_index()
  other = other.reset_index()
  df['datetime'] = pd.to_datetime(df['datetime'])
  other['datetime'] = pd.to_datetime(other['datetime'])
  merged = pd.merge(df, other, on=['datetime', 'instrument'], how='inner')
  merged = merged.set_index(['datetime', 'instrument']).sort_index()
  ```


