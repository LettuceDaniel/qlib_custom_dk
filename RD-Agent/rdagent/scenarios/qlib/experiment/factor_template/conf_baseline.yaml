qlib_init:
    provider_uri: "/workspace/qlib_data/us_data"
    region: us

market: &market sp500_pit
benchmark: &benchmark SPY

data_handler_config: &data_handler_config
    start_time: {{ train_start | default("2014-01-01", true) }}
    end_time: {{ test_end | default("null", true) }}
    instruments: *market
    infer_processors:
        - class: FilterCol
          kwargs:
              fields_group: feature
              col_list: ["RESI5", "WVMA5", "RSQR5", "KLEN", "RSQR10", "CORR5", "CORD5", "CORR10",
                            "ROC60", "RESI10", "VSTD5", "RSQR60", "CORR60", "WVMA60", "STD5",
                            "RSQR20", "CORD60", "CORD10", "CORR20", "KLOW"
                        ]
        - class: RobustZScoreNorm
          kwargs:
              fields_group: feature
              clip_outlier: true
              fit_start_time: {{ train_start | default("2014-01-01", true) }}
              fit_end_time: {{ train_end | default("2022-12-31", true) }}
        - class: Fillna
          kwargs:
              fields_group: feature
    learn_processors:
        - class: DropnaLabel
        - class: CSRankNorm
          kwargs:
              fields_group: label
    label: ["Ref($close, -1)/$close - 1"] 

port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 40
            n_drop: 4
    backtest:
        start_time: {{ test_start | default("2025-01-01", true) }}
        end_time: {{ test_end | default("null", true) }}
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            limit_threshold: null
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0015
            min_cost: 5
task:
    model:
        class: LGBModel
        module_path: qlib.contrib.model.gbdt
        kwargs:
            objective: quantile
            alpha: 0.1
            loss: quantile
            colsample_bytree: 0.8879
            learning_rate: 0.2
            subsample: 0.8789
            lambda_l1: 205.6999
            lambda_l2: 580.9768
            max_depth: 8
            num_leaves: 210
            num_threads: 20
    dataset:
        class: DatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: DataHandlerLP
                module_path: qlib.contrib.data.handler
                kwargs: *data_handler_config
            segments:
                train: [{{ train_start | default("2014-01-01", true) }}, {{ train_end | default("2022-12-31", true) }}]
                valid: [{{ valid_start | default("2023-01-01", true) }}, {{ valid_end | default("2024-12-31", true) }}]
                test: [{{ test_start | default("2025-01-01", true) }}, {{ test_end | default("null", true) }}]
    record: 
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            ana_long_short: False
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            config: *port_analysis_config
