qlib_init:
    provider_uri: "/workspace/qlib_data/us_data"
    region: us
    exp_manager:
        class: "MLflowExpManager"
        module_path: "qlib.workflow.expm"
        kwargs:
            uri: "sqlite:///{{ RDAGENT_MLRUNS_DIR | default('/workspace/log_mlruns') }}/mlflow.db"
            default_exp_name: "exp_%Y%m%d_%H%M%S"

market: &market sp500_pit
benchmark: &benchmark SPY

data_handler_config: &data_handler_config
    start_time: {{ train_start | default("2014-01-01", true) }}
    end_time: {{ test_end | default("null", true) }}
    instruments: null
    data_loader:
        class: rdagent.scenarios.qlib.experiment.model_template.hdf5_data_loader.HDF5DataLoader
        kwargs:
            col_config:
                feature:
                    - OPEN
                    - HIGH
                    - LOW
                    - RET
                    - VOL
                label:
                    - LABEL
            h5_path: "/workspace/qlib_data/h5_data/daily_pv_all.h5"
    
    infer_processors:
        - class: RobustZScoreNorm
          kwargs:
              fields_group: feature
              clip_outlier: true
              fit_start_time: {{ train_start | default("2014-01-01", true) }}
              fit_end_time: {{ train_end | default("2022-12-31", true) }}
        - class: Fillna
          kwargs:
              fields_group: feature
    learn_processors:
        - class: DropnaLabel
        - class: CSRankNorm
          kwargs:
              fields_group: label

port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 50
            n_drop: 5
    backtest:
        start_time: {{ test_start | default("2025-01-01", true) }}
        end_time: {{ test_end | default("null", true) }}
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            limit_threshold: null
            deal_price: close
            open_cost: 0.0005
            close_cost: 0.0015
            min_cost: 5

task:
    model:
        class: GeneralPTNN
        module_path: qlib.contrib.model.pytorch_general_nn
        kwargs:
            n_epochs: {{ n_epochs | default(100) }}
            lr: {{ lr | default(0.001) }}
            early_stop: {{ early_stop | default(7) }}
            batch_size: {{ batch_size | default(512) }}
            weight_decay: {{ weight_decay | default(1e-5) }}
            metric: loss
            loss: mse
            n_jobs: 20
            GPU: 0
            pt_model_uri: "model.model_cls"
            pt_model_kwargs: {
                "num_features": 5
            }
    dataset:
        class: TSDatasetH
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: DataHandlerLP
                module_path: qlib.contrib.data.handler
                kwargs: *data_handler_config
            segments:
                train: [{{ train_start | default("2014-01-01", true) }}, {{ train_end | default("2022-12-31", true) }}]
                valid: [{{ valid_start | default("2023-01-01", true) }}, {{ valid_end | default("2024-12-31", true) }}]
                test: [{{ test_start | default("2025-01-01", true) }}, {{ test_end | default("null", true) }}]
            step_len: {{ step_len | default(20) }}
    record: 
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            ana_long_short: False
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            config: *port_analysis_config
